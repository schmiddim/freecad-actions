name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_run:
    workflows: ["Build and Publish Docker Image"]
    types: [completed]

permissions:
  contents: write
  packages: write

jobs:
  moving-tags:
    # Only run if Docker build succeeded (or if triggered by tag without workflow_run)
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create moving version tags
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          MINOR="$(echo "$VERSION" | cut -d. -f1-2)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -fa "v${MAJOR}" -m "Latest v${MAJOR} release (v${VERSION})"
          git tag -fa "v${MINOR}" -m "Latest v${MINOR} release (v${VERSION})"
          git push origin "v${MAJOR}" "v${MINOR}" --force

  release:
    runs-on: ubuntu-latest
    needs: moving-tags
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build exports for release
        uses: ./
        with:
          use-docker: 'false'

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: exports/**
