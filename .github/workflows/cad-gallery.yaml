name: CAD Gallery
# ~/.config/shell/gh-status.sh

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write      # für GitHub Releases (Assets hochladen)
  pages: write         # für GitHub Pages deploy
  id-token: write      # Pages OIDC-Auth

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  export:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6

      - name: Install Miniforge
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          activate-environment: freecad-env
          conda-remove-defaults: true
          use-mamba: true

      - name: Cache conda packages
        uses: actions/cache@v5
        with:
          path: ~/conda_pkgs_dir
          key: conda-pkgs-${{ runner.os }}-freecad-v1
          restore-keys: conda-pkgs-${{ runner.os }}-

      - name: Install FreeCAD
        run: mamba install -c conda-forge python=3.12 freecad -y --quiet

      - name: Export STL + STEP
        run: freecadcmd scripts/export.py

      - uses: actions/upload-artifact@v7
        with:
          name: cad-exports
          path: exports/

  build-gallery:
    runs-on: ubuntu-latest
    needs: export
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: cad-exports
          path: exports/

      - name: Build gallery HTML
        run: python scripts/build_gallery.py

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./gallery

  deploy:
    runs-on: ubuntu-latest
    needs: build-gallery
    if: github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    runs-on: ubuntu-latest
    needs: export
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cad-exports
          path: exports/
      - uses: softprops/action-gh-release@v3
        with:
          files: exports/**
