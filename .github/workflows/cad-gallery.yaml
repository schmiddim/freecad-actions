name: CAD Gallery

permissions:
  contents: write
  pages: write
  id-token: write
  packages: read

on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["Build and Publish Docker Image"]
    types: [completed]
    branches: [master]

jobs:
  build-and-deploy:
    # Only run if Docker build succeeded (or if triggered by push without workflow_run)
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build Gallery
        uses: ./
        with:
          use-docker: 'true'
          send-ping: 'true'

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./gallery

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
