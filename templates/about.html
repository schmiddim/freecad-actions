<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About - {{ title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    header {
      background: #16213e;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }
    header h1 { font-size: 1.5rem; font-weight: 600; }
    header nav { display: flex; gap: 1.5rem; align-items: center; }
    header a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    header a:hover { color: #fff; }
    header a.active { color: #fff; }
    .container {
      max-width: 700px;
      margin: 4rem auto;
      padding: 0 2rem;
    }
    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 2.5rem;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #0f3460;
      margin-bottom: 1.5rem;
      object-fit: cover;
    }
    h2 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .bio {
      color: #94a3b8;
      line-height: 1.6;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.4rem 0.9rem;
      border: 1px solid #0f3460;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .links a:hover {
      color: #fff;
      border-color: #e94560;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="index.html" style="color: inherit; text-decoration: none;">{{ title }}</a></h1>
    <nav>
      <a href="index.html">Gallery</a>
      <a href="about.html" class="active">About</a>
      <a href="rss.xml" title="Subscribe via RSS" style="display: flex; align-items: center; gap: 0.4rem;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19 7.38 20 6.18 20C5 20 4 19 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/>
        </svg>
        Subscribe
      </a>
    </nav>
  </header>

  <div class="container">
    <div class="card">
      {% if profile.avatar %}
      <img class="avatar" src="{{ profile.avatar }}" alt="{{ profile.name }}">
      {% endif %}
      <h2>{{ profile.name }}</h2>
      {% if profile.bio %}
      <p class="bio">{{ profile.bio }}</p>
      {% endif %}
      {% if profile.links %}
      <div class="links">
        {% for platform, url in profile.links.items() %}
        <a href="{{ url }}" target="_blank" rel="noopener">{{ platform }}</a>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </div>
</body>
</html>
